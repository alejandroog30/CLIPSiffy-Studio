<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Curve Fill Gradients -->
    <linearGradient id="blueFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.0" />
    </linearGradient>
    <linearGradient id="purpleFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0.0" />
    </linearGradient>
    <linearGradient id="orangeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.0" />
    </linearGradient>

    <!-- Subtle Drop Shadow for Curves -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Background Tech Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#475569" opacity="0.3" />
    </pattern>
  </defs>

  <!-- Background Layer -->
  <rect width="1200" height="400" fill="url(#bgGrad)" rx="16" />
  <rect width="1200" height="400" fill="url(#grid)" rx="16" />

  <!-- Fuzzy Curves Graphic (Left Side) -->
  <g transform="translate(120, 0)">
    <!-- Dark Baseline -->
    <line x1="60" y1="300" x2="640" y2="300" stroke="#334155" stroke-width="8" stroke-linecap="round" />

    <!-- Blue Curve -->
    <path d="M 100 300 C 160 300, 190 180, 250 180 C 310 180, 340 300, 400 300" fill="url(#blueFill)" />
    <path d="M 100 300 C 160 300, 190 180, 250 180 C 310 180, 340 300, 400 300" fill="none" stroke="#3B82F6" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="250" cy="180" r="8" fill="#FFFFFF" />

    <!-- Purple Curve (Tallest) -->
    <path d="M 200 300 C 260 300, 290 100, 350 100 C 410 100, 440 300, 500 300" fill="url(#purpleFill)" />
    <path d="M 200 300 C 260 300, 290 100, 350 100 C 410 100, 440 300, 500 300" fill="none" stroke="#A855F7" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="350" cy="100" r="8" fill="#FFFFFF" />

    <!-- Orange Curve -->
    <path d="M 300 300 C 360 300, 390 180, 450 180 C 510 180, 540 300, 600 300" fill="url(#orangeFill)" />
    <path d="M 300 300 C 360 300, 390 180, 450 180 C 510 180, 540 300, 600 300" fill="none" stroke="#F97316" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="450" cy="180" r="8" fill="#FFFFFF" />
  </g>

  <!-- Typography (Right Side) -->
  <g transform="translate(740, 185)">
    <text x="0" y="0" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="52" letter-spacing="-1">Fuzzy Logic</text>
    <text x="2" y="45" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="500" font-size="28">CLIPS System Library</text>
  </g>
</svg>